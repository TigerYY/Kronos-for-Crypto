# Kronos ES=F 1h 微调配置（保守版）
# 期货指数 1 小时 K 线，偏稳健超参

data:
  # TODO: 请将此路径修改为你本地的 ES=F 1h K线 CSV
  # 列需包含: timestamps, open, high, low, close, volume, amount
  data_path: "/path/to/your/ESF_1h.csv"

  lookback_window: 512
  predict_window: 48
  max_context: 512

  clip: 5.0
  train_ratio: 0.9
  val_ratio: 0.1
  test_ratio: 0.0

  normalization: "dataset"
  missing_strategy: "ffill"
  outlier_method: "quantile"
  outlier_quantile_low: 0.001
  outlier_quantile_high: 0.999

training:
  tokenizer_epochs: 20
  basemodel_epochs: 20

  batch_size: 32
  log_interval: 50
  num_workers: 6
  seed: 42

  tokenizer_learning_rate: 0.0002
  predictor_learning_rate: 0.00001

  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_weight_decay: 0.1
  accumulation_steps: 1

model_paths:
  pretrained_tokenizer: "/path/to/your/pretrained/Kronos-Tokenizer-base"
  pretrained_predictor: "/path/to/your/pretrained/Kronos-base"

  exp_name: "ESF_1h_conservative"
  base_path: "/path/to/your/Kronos/finetune_csv/finetuned"

  base_save_path: ""
  finetuned_tokenizer: ""
  tokenizer_save_name: "tokenizer"
  basemodel_save_name: "basemodel"

experiment:
  name: "kronos_esf_1h_conservative"
  description: "ES=F 1h, conservative config for futures index"
  use_comet: false
  train_tokenizer: true
  train_basemodel: true
  skip_existing: false

device:
  use_cuda: true
  device_id: 0
