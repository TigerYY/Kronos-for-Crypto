# Kronos BTC/USDT 1h 微调配置（保守版）

data:
  # TODO: 请将此路径修改为你本地的 BTC/USDT 1h K线 CSV
  # 示例："/Users/you/Kronos/finetune_csv/data/BTCUSDT_1h.csv"
  data_path: "/path/to/your/BTCUSDT_1h.csv"

  # 窗口设置：适中长度，兼顾局部与中期结构
  lookback_window: 512
  predict_window: 48
  max_context: 512

  # 标准化与清洗策略：偏稳健
  clip: 5.0
  train_ratio: 0.9
  val_ratio: 0.1
  test_ratio: 0.0

  # 归一化：使用全数据统计量，保证 train/val/test 一致
  normalization: "dataset"          # "window" | "dataset"

  # 缺失值处理：前向+后向填充
  missing_strategy: "ffill"         # "ffill" | "bfill" | "drop"

  # 异常值：按分位数裁剪，抑制极端 spike
  outlier_method: "quantile"        # "none" | "quantile" | "zscore"
  outlier_quantile_low: 0.001
  outlier_quantile_high: 0.999

training:
  # 训练轮数：保守，优先稳定收敛
  tokenizer_epochs: 20
  basemodel_epochs: 20

  batch_size: 32
  log_interval: 50
  num_workers: 6
  seed: 42

  tokenizer_learning_rate: 0.0002
  predictor_learning_rate: 0.00001

  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_weight_decay: 0.1

  accumulation_steps: 1

model_paths:
  # 预训练基础模型（需要先在本地下载到对应目录）
  pretrained_tokenizer: "/path/to/your/pretrained/Kronos-Tokenizer-base"
  pretrained_predictor: "/path/to/your/pretrained/Kronos-base"

  exp_name: "BTCUSDT_1h_conservative"
  base_path: "/path/to/your/Kronos/finetune_csv/finetuned"

  # 留空由系统自动基于 base_path + exp_name 生成
  base_save_path: ""
  finetuned_tokenizer: ""

  tokenizer_save_name: "tokenizer"
  basemodel_save_name: "basemodel"

experiment:
  name: "kronos_btcusdt_1h_conservative"
  description: "BTC/USDT 1h, conservative config with dataset-level normalization and quantile clipping"
  use_comet: false

  train_tokenizer: true
  train_basemodel: true
  skip_existing: false

device:
  use_cuda: true
  device_id: 0

